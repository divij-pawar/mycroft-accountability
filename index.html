<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation Index</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .docs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .doc-card {
            background: white;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .doc-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .doc-card h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.3em;
        }

        .doc-card .filename {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
        }

        .doc-card .link-arrow {
            display: inline-block;
            margin-top: 15px;
            color: #667eea;
            font-weight: 600;
        }

        .doc-card .link-arrow::after {
            content: ' →';
            margin-left: 5px;
            transition: margin-left 0.3s ease;
        }

        .doc-card:hover .link-arrow::after {
            margin-left: 10px;
        }

        .empty-state {
            text-align: center;
            color: white;
            font-size: 1.1em;
        }

        footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mycroft - Weekly Claude Artifacts</h1>
        <div class="docs-grid" id="docs-container"></div>
        <footer>
            <p>Dynamically generated index</p>
        </footer>
    </div>

    <script>
        async function loadDocumentationIndex() {
            const container = document.getElementById('docs-container');
            
            try {
                // Fetch the docs directory listing
                const response = await fetch('docs/');
                const html = await response.text();
                
                // Parse HTML to extract file names
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const links = doc.querySelectorAll('a[href$=".html"]');
                
                const files = Array.from(links)
                    .map(link => link.getAttribute('href'))
                    .filter(href => href && !href.startsWith('?') && href !== '../')
                    .sort();

                if (files.length === 0) {
                    container.innerHTML = '<div class="empty-state">No documentation files found.</div>';
                    return;
                }

                // Create card for each file
                files.forEach(file => {
                    const title = file
                        .replace('.html', '')
                        .replace(/_/g, ' ')
                        .replace(/\b\w/g, char => char.toUpperCase());

                    const card = document.createElement('a');
                    card.href = `docs/${file}`;
                    card.className = 'doc-card';
                    card.innerHTML = `
                        <div>
                            <h2>${title}</h2>
                            <div class="filename">${file}</div>
                        </div>
                        <div class="link-arrow">View Documentation</div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Error loading documentation index:', error);
                // Fallback: manually list known files
                const fallbackFiles = [
                    'accountability_layer_week1.html',
                    'inversion_audit_engine_week3.html',
                    'validation_loop_walkthrough_week2.html'
                ];

                fallbackFiles.forEach(file => {
                    const title = file
                        .replace('.html', '')
                        .replace(/_/g, ' ')
                        .replace(/\b\w/g, char => char.toUpperCase());

                    const card = document.createElement('a');
                    card.href = `docs/${file}`;
                    card.className = 'doc-card';
                    card.innerHTML = `
                        <div>
                            <h2>${title}</h2>
                            <div class="filename">${file}</div>
                        </div>
                        <div class="link-arrow">View Documentation</div>
                    `;
                    container.appendChild(card);
                });
            }
        }

        // Load documentation when page loads
        document.addEventListener('DOMContentLoaded', loadDocumentationIndex);
    </script>
</body>
</html>
